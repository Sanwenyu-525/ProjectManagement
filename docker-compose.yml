version: '3.8'

services:
  server:
    build: ./server
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=file:./devhub.db
      - JWT_SECRET=devhub-docker-secret
      - NODE_ENV=development
      - PORT=3001
    volumes:
      - ./server/src:/app/src
      - ./server/prisma:/app/prisma
      - db-data:/app/prisma

  client:
    build: ./client
    ports:
      - "5173:5173"
    depends_on:
      - server
    volumes:
      - ./client/src:/app/src

volumes:
  db-data:
