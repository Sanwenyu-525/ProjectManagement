<h2>页面优化范围</h2>
<p class="subtitle">除了搜索框居中，你还希望优化哪些页面方面？</p>

<div class="options" data-multiselect>
  <div class="option" data-choice="visual" onclick="toggleSelect(this)">
    <div class="letter">V</div>
    <div class="content">
      <h3>视觉设计</h3>
      <p>配色、字体、间距、卡片设计、整体美感</p>
    </div>
  </div>

  <div class="option" data-choice="layout" onclick="toggleSelect(this)">
    <div class="letter">L</div>
    <div class="content">
      <h3>布局和结构</h3>
      <p>侧边栏、主内容区、响应式、网格布局</p>
    </div>
  </div>

  <div class="option" data-choice="ux" onclick="toggleSelect(this)">
    <div class="letter">U</div>
    <div class="content">
      <h3>用户体验</h3>
      <p>导航、交互流畅性、加载状态、动画效果</p>
    </div>
  </div>

  <div class="option" data-choice="consistency" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>设计一致性</h3>
      <p>全局样式统一、组件规范、风格协调</p>
    </div>
  </div>
</div>

<p style="margin-top: 24px; color: #64748b; font-size: 14px;">选择你需要的优化方面（可多选），或在这里描述你想要的具体改进</p>
